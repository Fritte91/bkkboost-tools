<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Cropper — Free Online Tool | BkkBoost Tools</title>
  <meta name="description" content="Crop images with freeform or fixed aspect ratios. Free online image cropper — no signup, runs entirely in your browser.">
  <meta property="og:title" content="Image Cropper — Free Online Tool | BkkBoost Tools">
  <meta property="og:description" content="Crop images with freeform or fixed aspect ratios. Free online image cropper — no signup, runs entirely in your browser.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tools.bkkboost.com/tools/image-cropper.html">
  <meta property="og:site_name" content="BkkBoost Tools">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Image Cropper — Free Online Tool | BkkBoost Tools">
  <meta name="twitter:description" content="Crop images with freeform or fixed aspect ratios. Free online image cropper — no signup, runs entirely in your browser.">
  <link rel="canonical" href="https://tools.bkkboost.com/tools/image-cropper.html">
  <link rel="stylesheet" href="../shared.css">
  <script>(function(){try{var t=localStorage.getItem('bkk-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css">
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
  <style>
    .crop-shell {
      max-height: 540px;
      background: var(--checker-b);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .crop-shell img { max-width: 100%; display: block; }
    .preset-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .preset-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .preset-btn:hover { color: var(--text); border-color: var(--text3); }
    .preset-btn.active { background: var(--orange); border-color: var(--orange); color: white; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; justify-content: center; }
    .crop-info {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text2);
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <header class="toolbar">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="toolbar-brand"><div class="logo">Bkk<span>Boost</span></div><div class="logo-tag">TOOLS</div></div>
    <button type="button" class="theme-toggle" aria-label="Toggle light or dark theme" title="Toggle theme"><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </header>
  <main class="tool-container">
    <div class="tool-header">
      <h1>Image Cropper</h1>
      <p class="tool-desc">Drag the handles to crop. Output exports at the original image resolution.</p>
    </div>

    <div class="dropzone" id="dz">
      <div class="dropzone-icon">🔲</div>
      <div class="dropzone-title">Drop an image or click to browse</div>
      <div class="dropzone-subtitle">PNG, JPEG, WebP, GIF</div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <div id="errorBar" class="error-bar hidden"></div>

    <div id="workspace" class="hidden">
      <div class="panel">
        <div class="panel-title">Aspect ratio</div>
        <div class="preset-row" id="presets">
          <button class="preset-btn active" data-ratio="0">Free</button>
          <button class="preset-btn" data-ratio="1">1:1</button>
          <button class="preset-btn" data-ratio="1.7777777778">16:9</button>
          <button class="preset-btn" data-ratio="0.5625">9:16</button>
          <button class="preset-btn" data-ratio="1.3333333333">4:3</button>
          <button class="preset-btn" data-ratio="1.5">3:2</button>
        </div>
      </div>

      <div class="panel">
        <div class="crop-shell">
          <img id="cropImg" alt="">
        </div>
        <div class="crop-info" id="cropInfo">—</div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="downloadBtn">⬇ Crop & Download</button>
        <button class="btn-secondary" id="resetBtn">🔄 New image</button>
      </div>
    </div>
  </main>
  <footer class="footer">BkkBoost Tools · 100% client-side · Your files never leave your device</footer>

  <script>
    const dz = document.getElementById('dz');
    const fileInput = document.getElementById('fileInput');
    const errorBar = document.getElementById('errorBar');
    const workspace = document.getElementById('workspace');
    const cropImg = document.getElementById('cropImg');
    const cropInfo = document.getElementById('cropInfo');
    const presets = document.getElementById('presets');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');

    let originalFile = null;
    let cropper = null;
    let mimeType = 'image/png';

    function showError(msg) { errorBar.textContent = msg; errorBar.classList.remove('hidden'); }
    function clearError() { errorBar.classList.add('hidden'); }

    dz.addEventListener('click', () => fileInput.click());
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('dragover');
      if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

    function loadFile(file) {
      clearError();
      if (!file.type.startsWith('image/')) { showError('Please choose an image file.'); return; }
      originalFile = file;
      mimeType = file.type === 'image/gif' ? 'image/png' : (file.type || 'image/png');
      const reader = new FileReader();
      reader.onload = () => {
        cropImg.src = reader.result;
        workspace.classList.remove('hidden');
        if (cropper) cropper.destroy();
        cropper = new Cropper(cropImg, {
          viewMode: 1,
          dragMode: 'move',
          autoCropArea: 0.85,
          background: false,
          responsive: true,
          aspectRatio: NaN,
          crop(e) {
            const w = Math.round(e.detail.width);
            const h = Math.round(e.detail.height);
            cropInfo.textContent = w + ' × ' + h + ' px';
          }
        });
        [...presets.children].forEach(b => b.classList.remove('active'));
        presets.children[0].classList.add('active');
      };
      reader.onerror = () => showError('Could not read this file.');
      reader.readAsDataURL(file);
    }

    presets.addEventListener('click', e => {
      const btn = e.target.closest('.preset-btn');
      if (!btn || !cropper) return;
      [...presets.children].forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const r = parseFloat(btn.dataset.ratio);
      cropper.setAspectRatio(r === 0 ? NaN : r);
    });

    downloadBtn.addEventListener('click', () => {
      if (!cropper) return;
      const canvas = cropper.getCroppedCanvas({ imageSmoothingQuality: 'high' });
      if (!canvas) { showError('Could not generate cropped image.'); return; }
      canvas.toBlob(blob => {
        if (!blob) { showError('Could not encode cropped image.'); return; }
        const baseName = originalFile.name.replace(/\.[^.]+$/, '');
        const ext = mimeType === 'image/jpeg' ? 'jpg' :
                    mimeType === 'image/webp' ? 'webp' : 'png';
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = baseName + '-cropped.' + ext;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 0);
      }, mimeType, 0.92);
    });

    resetBtn.addEventListener('click', () => {
      originalFile = null;
      if (cropper) { cropper.destroy(); cropper = null; }
      workspace.classList.add('hidden');
      fileInput.value = '';
      cropImg.removeAttribute('src');
      cropInfo.textContent = '—';
      clearError();
    });
  </script>
  <script src="../shared.js"></script>
</body>
</html>
