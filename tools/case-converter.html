<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Converter — Free Online Tool | BkkBoost Tools</title>
  <meta name="description" content="Convert text between UPPERCASE, lowercase, Title Case, camelCase, snake_case, and more. Free, no signup, runs in your browser.">
  <meta property="og:title" content="Case Converter — Free Online Tool | BkkBoost Tools">
  <meta property="og:description" content="Convert text between UPPERCASE, lowercase, Title Case, camelCase, snake_case, and more. Free, no signup, runs in your browser.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tools.bkkboost.com/tools/case-converter.html">
  <meta property="og:site_name" content="BkkBoost Tools">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Case Converter — Free Online Tool | BkkBoost Tools">
  <meta name="twitter:description" content="Convert text between UPPERCASE, lowercase, Title Case, camelCase, snake_case, and more. Free, no signup, runs in your browser.">
  <link rel="canonical" href="https://tools.bkkboost.com/tools/case-converter.html">
  <link rel="stylesheet" href="../shared.css">
  <script>(function(){try{var t=localStorage.getItem('bkk-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
  <style>
    .case-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0 4px; }
    .case-buttons button { flex: 0 0 auto; }
    .actions { display: flex; gap: 10px; margin-top: 14px; }
    .status { font-size: 12px; color: var(--text3); margin-top: 8px; min-height: 16px; }
  </style>
</head>
<body>
  <header class="toolbar">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="toolbar-brand"><div class="logo">Bkk<span>Boost</span></div><div class="logo-tag">TOOLS</div></div>
    <button type="button" class="theme-toggle" aria-label="Toggle light or dark theme" title="Toggle theme"><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </header>
  <main class="tool-container">
    <div class="tool-header">
      <h1>Case Converter</h1>
      <p class="tool-desc">Convert text between common letter cases used in writing and code.</p>
    </div>
    <div class="panel">
      <label for="input">Input</label>
      <textarea id="input" placeholder="Type or paste text here…" style="min-height: 140px;"></textarea>
      <div class="case-buttons">
        <button class="btn-secondary btn-sm" data-case="upper">UPPERCASE</button>
        <button class="btn-secondary btn-sm" data-case="lower">lowercase</button>
        <button class="btn-secondary btn-sm" data-case="title">Title Case</button>
        <button class="btn-secondary btn-sm" data-case="sentence">Sentence case</button>
        <button class="btn-secondary btn-sm" data-case="camel">camelCase</button>
        <button class="btn-secondary btn-sm" data-case="snake">snake_case</button>
        <button class="btn-secondary btn-sm" data-case="kebab">kebab-case</button>
        <button class="btn-secondary btn-sm" data-case="constant">CONSTANT_CASE</button>
      </div>
    </div>
    <div class="panel">
      <label for="output">Output</label>
      <textarea id="output" readonly placeholder="Output will appear here…" style="min-height: 140px;"></textarea>
      <div class="actions">
        <button class="btn-primary" id="copyBtn">📋 Copy</button>
        <button class="btn-ghost" id="useBtn">Use as input</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </main>
  <footer class="footer">BkkBoost Tools · 100% client-side · Your text never leaves your device</footer>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    function tokenize(s) {
      return s
        .replace(/([a-z0-9])([A-Z])/g, '$1 $2')
        .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
        .split(/[^a-zA-Z0-9]+/)
        .filter(Boolean);
    }

    const handlers = {
      upper:    s => s.toUpperCase(),
      lower:    s => s.toLowerCase(),
      title:    s => s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()),
      sentence: s => {
        const t = s.toLowerCase();
        return t.replace(/(^\s*\w|[.!?]\s+\w)/g, c => c.toUpperCase());
      },
      camel:    s => {
        const w = tokenize(s);
        if (!w.length) return '';
        return w[0].toLowerCase() + w.slice(1).map(x => x[0].toUpperCase() + x.slice(1).toLowerCase()).join('');
      },
      snake:    s => tokenize(s).map(x => x.toLowerCase()).join('_'),
      kebab:    s => tokenize(s).map(x => x.toLowerCase()).join('-'),
      constant: s => tokenize(s).map(x => x.toUpperCase()).join('_'),
    };

    document.querySelectorAll('[data-case]').forEach(btn => {
      btn.addEventListener('click', () => {
        const fn = handlers[btn.dataset.case];
        output.value = fn(input.value);
      });
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      if (!output.value) return;
      try {
        await navigator.clipboard.writeText(output.value);
        status.textContent = 'Copied to clipboard.';
        setTimeout(() => status.textContent = '', 2000);
      } catch (e) { status.textContent = 'Could not copy.'; }
    });

    document.getElementById('useBtn').addEventListener('click', () => {
      input.value = output.value;
      output.value = '';
    });
  </script>
  <script src="../shared.js"></script>
</body>
</html>
