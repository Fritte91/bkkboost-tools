<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Converter — BkkBoost Tools</title>
  <meta name="description" content="Convert text between UPPERCASE, lowercase, Title Case, camelCase, snake_case, kebab-case, and more.">
  <link rel="stylesheet" href="../shared.css">
  <style>
    .case-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0 4px; }
    .case-buttons button { flex: 0 0 auto; }
    .actions { display: flex; gap: 10px; margin-top: 14px; }
    .status { font-size: 12px; color: var(--text3); margin-top: 8px; min-height: 16px; }
  </style>
</head>
<body>
  <header class="toolbar">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="toolbar-brand"><div class="logo">Bkk<span>Boost</span></div><div class="logo-tag">TOOLS</div></div>
  </header>
  <main class="tool-container">
    <div class="tool-header">
      <h1>Case Converter</h1>
      <p class="tool-desc">Convert text between common letter cases used in writing and code.</p>
    </div>
    <div class="panel">
      <label for="input">Input</label>
      <textarea id="input" placeholder="Type or paste text here…" style="min-height: 140px;"></textarea>
      <div class="case-buttons">
        <button class="btn-secondary btn-sm" data-case="upper">UPPERCASE</button>
        <button class="btn-secondary btn-sm" data-case="lower">lowercase</button>
        <button class="btn-secondary btn-sm" data-case="title">Title Case</button>
        <button class="btn-secondary btn-sm" data-case="sentence">Sentence case</button>
        <button class="btn-secondary btn-sm" data-case="camel">camelCase</button>
        <button class="btn-secondary btn-sm" data-case="snake">snake_case</button>
        <button class="btn-secondary btn-sm" data-case="kebab">kebab-case</button>
        <button class="btn-secondary btn-sm" data-case="constant">CONSTANT_CASE</button>
      </div>
    </div>
    <div class="panel">
      <label for="output">Output</label>
      <textarea id="output" readonly placeholder="Output will appear here…" style="min-height: 140px;"></textarea>
      <div class="actions">
        <button class="btn-primary" id="copyBtn">📋 Copy</button>
        <button class="btn-ghost" id="useBtn">Use as input</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </main>
  <footer class="footer">BkkBoost Tools · 100% client-side · Your text never leaves your device</footer>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    function tokenize(s) {
      return s
        .replace(/([a-z0-9])([A-Z])/g, '$1 $2')
        .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
        .split(/[^a-zA-Z0-9]+/)
        .filter(Boolean);
    }

    const handlers = {
      upper:    s => s.toUpperCase(),
      lower:    s => s.toLowerCase(),
      title:    s => s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()),
      sentence: s => {
        const t = s.toLowerCase();
        return t.replace(/(^\s*\w|[.!?]\s+\w)/g, c => c.toUpperCase());
      },
      camel:    s => {
        const w = tokenize(s);
        if (!w.length) return '';
        return w[0].toLowerCase() + w.slice(1).map(x => x[0].toUpperCase() + x.slice(1).toLowerCase()).join('');
      },
      snake:    s => tokenize(s).map(x => x.toLowerCase()).join('_'),
      kebab:    s => tokenize(s).map(x => x.toLowerCase()).join('-'),
      constant: s => tokenize(s).map(x => x.toUpperCase()).join('_'),
    };

    document.querySelectorAll('[data-case]').forEach(btn => {
      btn.addEventListener('click', () => {
        const fn = handlers[btn.dataset.case];
        output.value = fn(input.value);
      });
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      if (!output.value) return;
      try {
        await navigator.clipboard.writeText(output.value);
        status.textContent = 'Copied to clipboard.';
        setTimeout(() => status.textContent = '', 2000);
      } catch (e) { status.textContent = 'Could not copy.'; }
    });

    document.getElementById('useBtn').addEventListener('click', () => {
      input.value = output.value;
      output.value = '';
    });
  </script>
</body>
</html>
