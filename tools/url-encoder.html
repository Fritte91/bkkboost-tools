<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Encode/Decode — BkkBoost Tools</title>
  <meta name="description" content="Encode and decode URL components. Live two-way conversion.">
  <link rel="stylesheet" href="../shared.css">
  <style>
    .twin { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; justify-content: center; }
    .status { font-size: 12px; color: var(--text3); margin-top: 8px; min-height: 16px; text-align: center; }
    .status.err { color: #FCA5A5; }
    @media (max-width: 720px) { .twin { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="toolbar">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="toolbar-brand"><div class="logo">Bkk<span>Boost</span></div><div class="logo-tag">TOOLS</div></div>
  </header>
  <main class="tool-container">
    <div class="tool-header">
      <h1>URL Encode/Decode</h1>
      <p class="tool-desc">Percent-encode strings for use in URLs and query parameters. Updates live.</p>
    </div>

    <div class="panel">
      <div class="twin">
        <div>
          <label for="plain">Plain text</label>
          <textarea id="plain" placeholder="Hello world & friends" style="min-height: 220px;"></textarea>
        </div>
        <div>
          <label for="encoded">URL-encoded</label>
          <textarea id="encoded" placeholder="Hello%20world%20%26%20friends" style="min-height: 220px;"></textarea>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="encBtn">→ Encode</button>
        <button class="btn-primary" id="decBtn">← Decode</button>
        <button class="btn-secondary" id="copyPlainBtn">📋 Copy plain</button>
        <button class="btn-secondary" id="copyEncBtn">📋 Copy encoded</button>
        <button class="btn-ghost" id="clearBtn">Clear</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </main>
  <footer class="footer">BkkBoost Tools · 100% client-side</footer>
  <script>
    const plain = document.getElementById('plain');
    const encoded = document.getElementById('encoded');
    const status = document.getElementById('status');

    function setStatus(msg, isErr) {
      status.textContent = msg;
      status.className = 'status' + (isErr ? ' err' : '');
      if (msg) setTimeout(() => { status.textContent = ''; status.className = 'status'; }, 2200);
    }

    let lock = false;
    function encode() {
      if (lock) return;
      lock = true;
      try { encoded.value = encodeURIComponent(plain.value); }
      catch (e) { setStatus('Encode failed.', true); }
      finally { lock = false; }
    }
    function decode() {
      if (lock) return;
      lock = true;
      try { plain.value = decodeURIComponent(encoded.value); }
      catch (e) { setStatus('Invalid URL encoding.', true); }
      finally { lock = false; }
    }

    plain.addEventListener('input', encode);
    encoded.addEventListener('input', decode);
    document.getElementById('encBtn').addEventListener('click', () => { encode(); setStatus('Encoded.'); });
    document.getElementById('decBtn').addEventListener('click', () => { decode(); setStatus('Decoded.'); });

    async function copy(val, msg) {
      if (!val) return;
      try { await navigator.clipboard.writeText(val); setStatus(msg); } catch (e) { setStatus('Copy failed.', true); }
    }
    document.getElementById('copyPlainBtn').addEventListener('click', () => copy(plain.value, 'Plain copied.'));
    document.getElementById('copyEncBtn').addEventListener('click', () => copy(encoded.value, 'Encoded copied.'));
    document.getElementById('clearBtn').addEventListener('click', () => { plain.value = ''; encoded.value = ''; });
  </script>
</body>
</html>
