<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Encode/Decode — Free Online Tool | BkkBoost Tools</title>
  <meta name="description" content="Encode and decode URL components with live two-way conversion. Free, no signup, runs entirely in your browser.">
  <meta property="og:title" content="URL Encode/Decode — Free Online Tool | BkkBoost Tools">
  <meta property="og:description" content="Encode and decode URL components with live two-way conversion. Free, no signup, runs entirely in your browser.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tools.bkkboost.com/tools/url-encoder.html">
  <meta property="og:site_name" content="BkkBoost Tools">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="URL Encode/Decode — Free Online Tool | BkkBoost Tools">
  <meta name="twitter:description" content="Encode and decode URL components with live two-way conversion. Free, no signup, runs entirely in your browser.">
  <link rel="canonical" href="https://tools.bkkboost.com/tools/url-encoder.html">
  <link rel="stylesheet" href="../shared.css">
  <script>(function(){try{var t=localStorage.getItem('bkk-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
  <style>
    .twin { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; justify-content: center; }
    .status { font-size: 12px; color: var(--text3); margin-top: 8px; min-height: 16px; text-align: center; }
    .status.err { color: #FCA5A5; }
    @media (max-width: 720px) { .twin { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="toolbar">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="toolbar-brand"><div class="logo">Bkk<span>Boost</span></div><div class="logo-tag">TOOLS</div></div>
    <button type="button" class="theme-toggle" aria-label="Toggle light or dark theme" title="Toggle theme"><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </header>
  <main class="tool-container">
    <div class="tool-header">
      <h1>URL Encode/Decode</h1>
      <p class="tool-desc">Percent-encode strings for use in URLs and query parameters. Updates live.</p>
    </div>

    <div class="panel">
      <div class="twin">
        <div>
          <label for="plain">Plain text</label>
          <textarea id="plain" placeholder="Hello world & friends" style="min-height: 220px;"></textarea>
        </div>
        <div>
          <label for="encoded">URL-encoded</label>
          <textarea id="encoded" placeholder="Hello%20world%20%26%20friends" style="min-height: 220px;"></textarea>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="encBtn">→ Encode</button>
        <button class="btn-primary" id="decBtn">← Decode</button>
        <button class="btn-secondary" id="copyPlainBtn">📋 Copy plain</button>
        <button class="btn-secondary" id="copyEncBtn">📋 Copy encoded</button>
        <button class="btn-ghost" id="clearBtn">Clear</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </main>
  <footer class="footer">BkkBoost Tools · 100% client-side</footer>
  <script>
    const plain = document.getElementById('plain');
    const encoded = document.getElementById('encoded');
    const status = document.getElementById('status');

    function setStatus(msg, isErr) {
      status.textContent = msg;
      status.className = 'status' + (isErr ? ' err' : '');
      if (msg) setTimeout(() => { status.textContent = ''; status.className = 'status'; }, 2200);
    }

    let lock = false;
    function encode() {
      if (lock) return;
      lock = true;
      try { encoded.value = encodeURIComponent(plain.value); }
      catch (e) { setStatus('Encode failed.', true); }
      finally { lock = false; }
    }
    function decode() {
      if (lock) return;
      lock = true;
      try { plain.value = decodeURIComponent(encoded.value); }
      catch (e) { setStatus('Invalid URL encoding.', true); }
      finally { lock = false; }
    }

    plain.addEventListener('input', encode);
    encoded.addEventListener('input', decode);
    document.getElementById('encBtn').addEventListener('click', () => { encode(); setStatus('Encoded.'); });
    document.getElementById('decBtn').addEventListener('click', () => { decode(); setStatus('Decoded.'); });

    async function copy(val, msg) {
      if (!val) return;
      try { await navigator.clipboard.writeText(val); setStatus(msg); } catch (e) { setStatus('Copy failed.', true); }
    }
    document.getElementById('copyPlainBtn').addEventListener('click', () => copy(plain.value, 'Plain copied.'));
    document.getElementById('copyEncBtn').addEventListener('click', () => copy(encoded.value, 'Encoded copied.'));
    document.getElementById('clearBtn').addEventListener('click', () => { plain.value = ''; encoded.value = ''; });
  </script>
  <script src="../shared.js"></script>
</body>
</html>
