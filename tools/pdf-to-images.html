<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF to Images — BkkBoost Tools</title>
  <meta name="description" content="Convert PDF pages to PNG or JPEG images. Runs entirely in your browser.">
  <link rel="stylesheet" href="../shared.css">
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    .file-summary { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .file-summary .file-icon { font-size: 22px; }
    .file-summary-name { flex: 1; min-width: 0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-summary-meta { font-family: 'DM Mono', monospace; color: var(--text3); font-size: 12px; white-space: nowrap; }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
    .slider-row { display: flex; align-items: center; gap: 12px; }
    .slider-row input[type="range"] { flex: 1; }
    .slider-val {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      min-width: 50px;
      text-align: right;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 14px;
    }
    .thumb {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .thumb-canvas-wrap {
      width: 100%;
      aspect-ratio: 0.77;
      background: white;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-canvas-wrap canvas { max-width: 100%; max-height: 100%; display: block; }
    .thumb-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text2);
    }
    .thumb-dl {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      font-size: 11px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .thumb-dl:hover { border-color: var(--orange); color: var(--text); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; justify-content: center; }
    .render-progress { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <header class="toolbar">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="toolbar-brand"><div class="logo">Bkk<span>Boost</span></div><div class="logo-tag">TOOLS</div></div>
  </header>
  <main class="tool-container">
    <div class="tool-header">
      <h1>PDF to Images</h1>
      <p class="tool-desc">Convert each PDF page to a PNG or JPEG image. Choose resolution and quality.</p>
    </div>

    <div class="dropzone" id="dz">
      <div class="dropzone-icon">🖼</div>
      <div class="dropzone-title">Drop a PDF or click to browse</div>
      <div class="dropzone-subtitle">Single PDF file</div>
      <input type="file" id="fileInput" accept="application/pdf" hidden>
    </div>

    <div id="errorBar" class="error-bar hidden"></div>

    <div id="workspace" class="hidden">
      <div class="panel">
        <div class="file-summary">
          <span class="file-icon">📄</span>
          <span class="file-summary-name" id="fileName"></span>
          <span class="file-summary-meta" id="fileMeta"></span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Output settings</div>
        <div class="settings-grid">
          <div>
            <label for="format">Format</label>
            <select id="format">
              <option value="image/png">PNG (lossless)</option>
              <option value="image/jpeg">JPEG (smaller)</option>
            </select>
          </div>
          <div>
            <label for="scale">Resolution</label>
            <select id="scale">
              <option value="1">1× (standard)</option>
              <option value="1.5" selected>1.5× (sharp)</option>
              <option value="2">2× (high)</option>
              <option value="3">3× (very high)</option>
            </select>
          </div>
          <div id="qualityWrap" class="hidden" style="grid-column: 1 / -1;">
            <label for="quality">JPEG quality</label>
            <div class="slider-row">
              <input type="range" id="quality" min="10" max="100" value="85">
              <div class="slider-val" id="qualityVal">85%</div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Pages</div>
        <div class="thumbs" id="thumbs"></div>
        <div class="render-progress hidden" id="renderProgress"></div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="downloadAllBtn">⬇ Download all (ZIP)</button>
        <button class="btn-secondary" id="resetBtn">🔄 New PDF</button>
      </div>
    </div>
  </main>
  <footer class="footer">BkkBoost Tools · 100% client-side · Your files never leave your device</footer>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    const dz = document.getElementById('dz');
    const fileInput = document.getElementById('fileInput');
    const errorBar = document.getElementById('errorBar');
    const workspace = document.getElementById('workspace');
    const fileNameEl = document.getElementById('fileName');
    const fileMetaEl = document.getElementById('fileMeta');
    const thumbsEl = document.getElementById('thumbs');
    const renderProgress = document.getElementById('renderProgress');
    const formatSel = document.getElementById('format');
    const scaleSel = document.getElementById('scale');
    const qualityWrap = document.getElementById('qualityWrap');
    const qualityRange = document.getElementById('quality');
    const qualityVal = document.getElementById('qualityVal');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const resetBtn = document.getElementById('resetBtn');

    let originalFile = null;
    let pdfDoc = null;
    let pageCount = 0;

    function fmtSize(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
      return (b/1024/1024).toFixed(2) + ' MB';
    }
    function showError(msg) { errorBar.textContent = msg; errorBar.classList.remove('hidden'); }
    function clearError() { errorBar.classList.add('hidden'); }

    function updateQualityVisibility() {
      qualityWrap.classList.toggle('hidden', formatSel.value !== 'image/jpeg');
    }
    formatSel.addEventListener('change', updateQualityVisibility);
    qualityRange.addEventListener('input', () => { qualityVal.textContent = qualityRange.value + '%'; });
    updateQualityVisibility();

    dz.addEventListener('click', () => fileInput.click());
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

    async function loadFile(file) {
      clearError();
      if (file.type !== 'application/pdf' && !/\.pdf$/i.test(file.name)) {
        showError('Please choose a PDF file.');
        return;
      }
      try {
        originalFile = file;
        const bytes = new Uint8Array(await file.arrayBuffer());
        pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
        pageCount = pdfDoc.numPages;
        fileNameEl.textContent = file.name;
        fileMetaEl.textContent = `${pageCount} pages · ${fmtSize(file.size)}`;
        workspace.classList.remove('hidden');
        thumbsEl.innerHTML = '';
        renderProgress.classList.remove('hidden');
        for (let i = 1; i <= pageCount; i++) {
          renderProgress.textContent = `Rendering thumbnail ${i} / ${pageCount}…`;
          await renderThumbCard(i);
        }
        renderProgress.classList.add('hidden');
      } catch (err) {
        showError('Could not read this PDF. ' + (err.message || ''));
      }
    }

    async function renderThumbCard(pageNum) {
      const page = await pdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: 0.4 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      const card = document.createElement('div');
      card.className = 'thumb';
      card.innerHTML = `
        <div class="thumb-canvas-wrap"></div>
        <div class="thumb-label">Page ${pageNum}</div>
        <button class="thumb-dl">⬇ Download</button>
      `;
      card.querySelector('.thumb-canvas-wrap').appendChild(canvas);
      card.querySelector('.thumb-dl').addEventListener('click', () => downloadPage(pageNum));
      thumbsEl.appendChild(card);
    }

    async function renderPageBlob(pageNum) {
      const page = await pdfDoc.getPage(pageNum);
      const scale = parseFloat(scaleSel.value);
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      if (formatSel.value === 'image/jpeg') {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      await page.render({ canvasContext: ctx, viewport }).promise;
      const q = formatSel.value === 'image/jpeg' ? qualityRange.value / 100 : undefined;
      return new Promise(res => canvas.toBlob(b => res(b), formatSel.value, q));
    }

    function outputExt() {
      return formatSel.value === 'image/jpeg' ? 'jpg' : 'png';
    }

    function baseName() {
      return originalFile.name.replace(/\.[^.]+$/, '');
    }

    async function downloadPage(pageNum) {
      try {
        const blob = await renderPageBlob(pageNum);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${baseName()}-page-${String(pageNum).padStart(3, '0')}.${outputExt()}`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 0);
      } catch (err) {
        showError('Failed to render page. ' + (err.message || ''));
      }
    }

    downloadAllBtn.addEventListener('click', async () => {
      if (!pdfDoc) return;
      downloadAllBtn.disabled = true;
      const orig = downloadAllBtn.innerHTML;
      clearError();
      try {
        const zip = new JSZip();
        const ext = outputExt();
        for (let i = 1; i <= pageCount; i++) {
          downloadAllBtn.innerHTML = `<span class="spinner"></span> Rendering ${i} / ${pageCount}...`;
          const blob = await renderPageBlob(i);
          zip.file(`${baseName()}-page-${String(i).padStart(3, '0')}.${ext}`, blob);
        }
        downloadAllBtn.innerHTML = `<span class="spinner"></span> Building ZIP...`;
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(zipBlob);
        a.download = `${baseName()}-images.zip`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 0);
      } catch (err) {
        showError('Failed to build ZIP. ' + (err.message || ''));
      } finally {
        downloadAllBtn.innerHTML = orig;
        downloadAllBtn.disabled = false;
      }
    });

    resetBtn.addEventListener('click', () => {
      originalFile = null;
      pdfDoc = null;
      pageCount = 0;
      workspace.classList.add('hidden');
      thumbsEl.innerHTML = '';
      fileInput.value = '';
      clearError();
    });
  </script>
</body>
</html>
