<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timestamp Converter — BkkBoost Tools</title>
  <meta name="description" content="Convert between Unix timestamps, ISO 8601, local, UTC, and relative time.">
  <link rel="stylesheet" href="../shared.css">
  <style>
    .row-input { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; }
    .row-input > div { flex: 1; min-width: 160px; }
    .row-input button { flex: 0 0 auto; }
    .results { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 4px; }
    .result-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .result-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex: 0 0 auto;
      min-width: 130px;
    }
    .result-val {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      flex: 1;
      word-break: break-word;
      text-align: right;
    }
    .result-card button { flex: 0 0 auto; }
    .status { font-size: 12px; color: var(--text3); margin-top: 8px; min-height: 16px; }
    .status.err { color: #FCA5A5; }
    @media (max-width: 600px) {
      .result-card { flex-wrap: wrap; }
      .result-val { text-align: left; }
      .result-label { min-width: 100%; }
    }
  </style>
</head>
<body>
  <header class="toolbar">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="toolbar-brand"><div class="logo">Bkk<span>Boost</span></div><div class="logo-tag">TOOLS</div></div>
  </header>
  <main class="tool-container">
    <div class="tool-header">
      <h1>Timestamp Converter</h1>
      <p class="tool-desc">Enter a Unix timestamp (seconds or milliseconds) or any date string — see all common formats.</p>
    </div>

    <div class="panel">
      <div class="panel-title">Input</div>
      <div class="row-input">
        <div>
          <label for="input">Unix timestamp or date string</label>
          <input id="input" type="text" placeholder="e.g. 1714753200, 2024-05-03T12:00:00Z, May 3 2024">
        </div>
        <button class="btn-primary" id="nowBtn">Now</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Results</div>
      <div class="results" id="results"></div>
    </div>
  </main>
  <footer class="footer">BkkBoost Tools · 100% client-side</footer>
  <script>
    const input = document.getElementById('input');
    const status = document.getElementById('status');
    const results = document.getElementById('results');

    function setStatus(msg, isErr) {
      status.textContent = msg;
      status.className = 'status' + (isErr ? ' err' : '');
    }

    function parseInput(v) {
      v = (v || '').trim();
      if (!v) return null;
      if (/^-?\d+(\.\d+)?$/.test(v)) {
        const n = Number(v);
        const ms = Math.abs(n) > 1e12 ? n : n * 1000;
        const d = new Date(ms);
        return isNaN(d) ? null : d;
      }
      const d = new Date(v);
      return isNaN(d) ? null : d;
    }

    function relativeTime(d) {
      const now = Date.now();
      const diff = d.getTime() - now;
      const past = diff < 0;
      const abs = Math.abs(diff);
      const units = [
        { n: 'year',   ms: 365.25 * 24 * 3600 * 1000 },
        { n: 'month',  ms: 30.44 * 24 * 3600 * 1000 },
        { n: 'day',    ms: 24 * 3600 * 1000 },
        { n: 'hour',   ms: 3600 * 1000 },
        { n: 'minute', ms: 60 * 1000 },
        { n: 'second', ms: 1000 },
      ];
      for (const u of units) {
        const v = Math.floor(abs / u.ms);
        if (v >= 1) {
          const label = v + ' ' + u.n + (v === 1 ? '' : 's');
          return past ? label + ' ago' : 'in ' + label;
        }
      }
      return 'just now';
    }

    function row(label, val) {
      const div = document.createElement('div');
      div.className = 'result-card';
      const lab = document.createElement('div');
      lab.className = 'result-label';
      lab.textContent = label;
      const v = document.createElement('div');
      v.className = 'result-val';
      v.textContent = val;
      const btn = document.createElement('button');
      btn.className = 'btn-ghost btn-sm';
      btn.textContent = 'Copy';
      btn.onclick = async () => {
        try { await navigator.clipboard.writeText(val); btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1200); } catch (e) {}
      };
      div.appendChild(lab);
      div.appendChild(v);
      div.appendChild(btn);
      return div;
    }

    function update() {
      const d = parseInput(input.value);
      results.innerHTML = '';
      if (!d) {
        if (input.value.trim()) setStatus('Could not parse as timestamp or date.', true);
        else setStatus('');
        return;
      }
      setStatus('');
      const ms = d.getTime();
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      results.appendChild(row('Unix (seconds)', String(Math.floor(ms / 1000))));
      results.appendChild(row('Unix (ms)', String(ms)));
      results.appendChild(row('ISO 8601', d.toISOString()));
      results.appendChild(row('Local (' + tz + ')', d.toLocaleString(undefined, { dateStyle: 'full', timeStyle: 'long' })));
      results.appendChild(row('UTC', d.toUTCString()));
      results.appendChild(row('Relative', relativeTime(d)));
    }

    input.addEventListener('input', update);
    document.getElementById('nowBtn').addEventListener('click', () => {
      input.value = String(Math.floor(Date.now() / 1000));
      update();
      input.focus();
    });

    input.value = String(Math.floor(Date.now() / 1000));
    update();
  </script>
</body>
</html>
