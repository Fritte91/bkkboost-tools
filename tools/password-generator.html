<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator — BkkBoost Tools</title>
  <meta name="description" content="Generate strong, random passwords with customizable length and character sets.">
  <link rel="stylesheet" href="../shared.css">
  <style>
    .pw-output {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      padding: 16px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      word-break: break-all;
      min-height: 56px;
      display: flex;
      align-items: center;
      color: var(--text);
    }
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .toggle-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .toggle-row input { width: auto; }
    .toggle-row label { margin: 0; cursor: pointer; color: var(--text); font-size: 14px; flex: 1; }
    .strength { margin-top: 12px; }
    .strength-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%; width: 0%;
      transition: width 0.2s, background 0.2s;
      background: var(--text3);
    }
    .strength-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text2);
      margin-top: 6px;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .bulk-list {
      list-style: none;
      max-height: 360px;
      overflow-y: auto;
      margin-top: 12px;
      padding: 0;
    }
    .bulk-list li {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      word-break: break-all;
    }
    .slider-row { display: flex; align-items: center; gap: 12px; }
    .slider-row input[type=range] { flex: 1; }
    .slider-val {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      min-width: 36px;
      text-align: right;
    }
    .status { font-size: 12px; color: var(--text3); margin-top: 8px; min-height: 16px; }
    @media (max-width: 600px) { .controls-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="toolbar">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="toolbar-brand"><div class="logo">Bkk<span>Boost</span></div><div class="logo-tag">TOOLS</div></div>
  </header>
  <main class="tool-container">
    <div class="tool-header">
      <h1>Password Generator</h1>
      <p class="tool-desc">Generate strong, random passwords using crypto.getRandomValues — never Math.random.</p>
    </div>

    <div class="panel">
      <div class="panel-title">Options</div>
      <div class="stack">
        <div>
          <label for="length">Length</label>
          <div class="slider-row">
            <input type="range" id="length" min="8" max="128" value="20">
            <span class="slider-val" id="lengthVal">20</span>
          </div>
        </div>
        <div class="controls-grid">
          <div class="toggle-row"><input type="checkbox" id="optUpper" checked><label for="optUpper">Uppercase (A–Z)</label></div>
          <div class="toggle-row"><input type="checkbox" id="optLower" checked><label for="optLower">Lowercase (a–z)</label></div>
          <div class="toggle-row"><input type="checkbox" id="optNumbers" checked><label for="optNumbers">Numbers (0–9)</label></div>
          <div class="toggle-row"><input type="checkbox" id="optSymbols"><label for="optSymbols">Symbols (!@#$…)</label></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Password</div>
      <div class="pw-output" id="output">Click Generate</div>
      <div class="strength">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label"><span id="strengthLabel">—</span><span id="strengthEntropy"></span></div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="genBtn">🔑 Generate</button>
        <button class="btn-secondary" id="copyBtn">📋 Copy</button>
        <button class="btn-secondary" id="bulkBtn">Generate 10</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="panel hidden" id="bulkPanel">
      <div class="panel-title">Bulk passwords</div>
      <ul class="bulk-list" id="bulkList"></ul>
      <div class="actions">
        <button class="btn-secondary" id="bulkCopyBtn">📋 Copy all</button>
      </div>
    </div>
  </main>
  <footer class="footer">BkkBoost Tools · 100% client-side · Passwords never leave your device</footer>
  <script>
    const lengthEl = document.getElementById('length');
    const lengthVal = document.getElementById('lengthVal');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const optUpper = document.getElementById('optUpper');
    const optLower = document.getElementById('optLower');
    const optNumbers = document.getElementById('optNumbers');
    const optSymbols = document.getElementById('optSymbols');

    const SETS = {
      upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lower: 'abcdefghijklmnopqrstuvwxyz',
      numbers: '0123456789',
      symbols: '!@#$%^&*()-_=+[]{};:,.<>?/~'
    };

    lengthEl.addEventListener('input', () => lengthVal.textContent = lengthEl.value);

    function buildAlphabet() {
      let abc = '';
      if (optUpper.checked) abc += SETS.upper;
      if (optLower.checked) abc += SETS.lower;
      if (optNumbers.checked) abc += SETS.numbers;
      if (optSymbols.checked) abc += SETS.symbols;
      return abc;
    }

    function randomFrom(abc, n) {
      const out = [];
      const arr = new Uint32Array(n);
      crypto.getRandomValues(arr);
      for (let i = 0; i < n; i++) out.push(abc[arr[i] % abc.length]);
      return out.join('');
    }

    function generate() {
      const abc = buildAlphabet();
      if (!abc) {
        status.textContent = 'Pick at least one character set.';
        return null;
      }
      const len = parseInt(lengthEl.value, 10);
      status.textContent = '';
      return randomFrom(abc, len);
    }

    function entropy(pw) {
      const sets = [
        { re: /[A-Z]/, n: 26 }, { re: /[a-z]/, n: 26 },
        { re: /\d/, n: 10 }, { re: /[^A-Za-z0-9]/, n: 28 }
      ];
      const pool = sets.reduce((sum, s) => sum + (s.re.test(pw) ? s.n : 0), 0);
      return pool ? Math.round(pw.length * Math.log2(pool)) : 0;
    }

    function updateStrength(pw) {
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      const ent = document.getElementById('strengthEntropy');
      const e = entropy(pw);
      let pct, color, name;
      if (e < 40)      { pct = 25;  color = 'var(--red)';    name = 'Weak'; }
      else if (e < 60) { pct = 50;  color = 'var(--yellow)'; name = 'Okay'; }
      else if (e < 80) { pct = 75;  color = 'var(--blue)';   name = 'Strong'; }
      else             { pct = 100; color = 'var(--green)';  name = 'Excellent'; }
      fill.style.width = pct + '%';
      fill.style.background = color;
      label.textContent = name;
      ent.textContent = '~' + e + ' bits of entropy';
    }

    function doGenerate() {
      const pw = generate();
      if (!pw) return;
      output.textContent = pw;
      updateStrength(pw);
    }

    document.getElementById('genBtn').addEventListener('click', doGenerate);

    function flash(msg) {
      status.textContent = msg;
      setTimeout(() => status.textContent = '', 2000);
    }

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const v = output.textContent;
      if (!v || v === 'Click Generate') return;
      try { await navigator.clipboard.writeText(v); flash('Copied to clipboard.'); } catch (e) { flash('Could not copy.'); }
    });

    const bulkPanel = document.getElementById('bulkPanel');
    const bulkList = document.getElementById('bulkList');

    document.getElementById('bulkBtn').addEventListener('click', () => {
      const items = [];
      for (let i = 0; i < 10; i++) {
        const pw = generate();
        if (!pw) return;
        items.push(pw);
      }
      bulkPanel.classList.remove('hidden');
      bulkList.innerHTML = '';
      items.forEach(pw => {
        const li = document.createElement('li');
        const span = document.createElement('span');
        span.textContent = pw;
        const btn = document.createElement('button');
        btn.className = 'btn-ghost btn-sm';
        btn.textContent = 'Copy';
        btn.onclick = async () => {
          try { await navigator.clipboard.writeText(pw); btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1200); } catch (e) {}
        };
        li.appendChild(span);
        li.appendChild(btn);
        bulkList.appendChild(li);
      });
    });

    document.getElementById('bulkCopyBtn').addEventListener('click', async () => {
      const text = Array.from(bulkList.querySelectorAll('span')).map(s => s.textContent).join('\n');
      if (!text) return;
      try { await navigator.clipboard.writeText(text); flash('All 10 passwords copied.'); } catch (e) { flash('Could not copy.'); }
    });

    doGenerate();
  </script>
</body>
</html>
