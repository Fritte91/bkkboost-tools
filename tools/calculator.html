<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator — BkkBoost Tools</title>
  <meta name="description" content="A scientific calculator with trig, logs, exponents, factorial, and history.">
  <link rel="stylesheet" href="../shared.css">
  <style>
    .calc-wrap {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 760px) { .calc-wrap { grid-template-columns: 1fr; } }

    .display {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 12px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 4px;
    }
    .display-expr {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text2);
      min-height: 18px;
      text-align: right;
      word-break: break-all;
      line-height: 1.3;
    }
    .display-result {
      font-family: 'DM Mono', monospace;
      font-size: 30px;
      font-weight: 500;
      color: var(--text);
      text-align: right;
      word-break: break-all;
      line-height: 1.1;
    }
    .display-result.error { color: var(--red); font-size: 22px; }

    .keys {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    .key {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px 0;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.1s;
      user-select: none;
    }
    .key:hover { background: var(--surface3); border-color: var(--border2); }
    .key:active { transform: translateY(1px); }
    .key-fn {
      font-size: 12px;
      color: var(--text2);
      background: var(--surface);
    }
    .key-op {
      color: var(--orange);
      background: var(--surface);
    }
    .key-eq {
      background: var(--orange);
      color: white;
      border-color: var(--orange);
      grid-column: span 2;
    }
    .key-eq:hover { background: var(--orange-light); border-color: var(--orange-light); }
    .key-clear { color: var(--red); }
    .key-mono { font-family: 'DM Mono', monospace; }

    .history {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      max-height: 480px;
      display: flex;
      flex-direction: column;
    }
    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .history-empty {
      color: var(--text3);
      font-size: 13px;
      text-align: center;
      padding: 24px 8px;
    }
    .history-item {
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.15s;
    }
    .history-item:hover { background: var(--surface2); }
    .history-expr { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); word-break: break-all; }
    .history-result { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text); word-break: break-all; margin-top: 2px; }

    .keys-mobile-eq .key-eq { grid-column: span 2; }
  </style>
</head>
<body>
  <header class="toolbar">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="toolbar-brand"><div class="logo">Bkk<span>Boost</span></div><div class="logo-tag">TOOLS</div></div>
  </header>
  <main class="tool-container">
    <div class="tool-header">
      <h1>Scientific Calculator</h1>
      <p class="tool-desc">Trig, logs, exponents, factorial, and parentheses. Type with your keyboard or click the keys.</p>
    </div>

    <div class="calc-wrap">
      <div class="panel" style="padding: 16px;">
        <div class="display">
          <div class="display-expr" id="exprView">&nbsp;</div>
          <div class="display-result" id="resultView">0</div>
        </div>

        <div class="keys" id="keys">
          <button class="key key-fn" data-insert="sin(">sin</button>
          <button class="key key-fn" data-insert="cos(">cos</button>
          <button class="key key-fn" data-insert="tan(">tan</button>
          <button class="key key-fn" data-insert="log(">log</button>
          <button class="key key-fn" data-insert="ln(">ln</button>
          <button class="key key-fn" data-insert="sqrt(">√</button>

          <button class="key key-fn" data-insert="(">(</button>
          <button class="key key-fn" data-insert=")">)</button>
          <button class="key key-fn" data-insert="^">x^y</button>
          <button class="key key-fn" data-square>x²</button>
          <button class="key key-fn key-mono" data-insert="π">π</button>
          <button class="key key-fn key-mono" data-insert="e">e</button>

          <button class="key key-clear" data-clear>C</button>
          <button class="key" data-back>⌫</button>
          <button class="key" data-sign>±</button>
          <button class="key key-fn" data-insert="!">n!</button>
          <button class="key key-fn" data-insert="%">%</button>
          <button class="key key-op" data-insert="÷">÷</button>

          <button class="key" data-insert="7">7</button>
          <button class="key" data-insert="8">8</button>
          <button class="key" data-insert="9">9</button>
          <button class="key key-op" data-insert="×">×</button>
          <button class="key key-op" data-insert="-">−</button>
          <button class="key key-op" data-insert="+">+</button>

          <button class="key" data-insert="4">4</button>
          <button class="key" data-insert="5">5</button>
          <button class="key" data-insert="6">6</button>
          <button class="key" data-insert="1">1</button>
          <button class="key" data-insert="2">2</button>
          <button class="key" data-insert="3">3</button>

          <button class="key" data-insert="0" style="grid-column: span 2;">0</button>
          <button class="key" data-insert=".">.</button>
          <button class="key" data-ans>ans</button>
          <button class="key key-eq" data-eq>=</button>
        </div>
      </div>

      <div class="history">
        <div class="history-head">
          <div class="panel-title" style="margin: 0;">History</div>
          <button class="btn-ghost btn-sm" id="clearHist">Clear</button>
        </div>
        <ul class="history-list" id="histList">
          <li class="history-empty">No calculations yet.</li>
        </ul>
      </div>
    </div>
  </main>
  <footer class="footer">BkkBoost Tools · 100% client-side · Math runs in your browser</footer>

  <script>
    const exprView = document.getElementById('exprView');
    const resultView = document.getElementById('resultView');
    const histList = document.getElementById('histList');

    let expr = '';
    let lastAns = 0;
    let hasError = false;
    const history = [];

    function render() {
      exprView.textContent = expr || ' ';
      if (!expr) { resultView.textContent = '0'; resultView.classList.remove('error'); return; }
      try {
        const v = evaluate(expr);
        if (v === null || Number.isNaN(v) || !Number.isFinite(v)) {
          resultView.textContent = expr;
          resultView.classList.remove('error');
          return;
        }
        resultView.textContent = formatNumber(v);
        resultView.classList.remove('error');
      } catch (e) {
        resultView.textContent = expr;
        resultView.classList.remove('error');
      }
    }

    function formatNumber(n) {
      if (n === 0) return '0';
      const abs = Math.abs(n);
      if (abs > 1e15 || (abs > 0 && abs < 1e-6)) return n.toExponential(8).replace(/0+e/, 'e').replace(/\.e/, 'e');
      const s = parseFloat(n.toPrecision(12)).toString();
      return s;
    }

    function tokenize(s) {
      const tokens = [];
      let i = 0;
      while (i < s.length) {
        const ch = s[i];
        if (ch === ' ') { i++; continue; }
        if (/[0-9.]/.test(ch)) {
          let num = '';
          let dots = 0;
          while (i < s.length && /[0-9.]/.test(s[i])) {
            if (s[i] === '.') dots++;
            if (dots > 1) throw new Error('bad number');
            num += s[i++];
          }
          tokens.push({ type: 'num', value: parseFloat(num) });
          continue;
        }
        if (/[a-zA-Z]/.test(ch)) {
          let id = '';
          while (i < s.length && /[a-zA-Z]/.test(s[i])) id += s[i++];
          const lower = id.toLowerCase();
          if (lower === 'e') tokens.push({ type: 'num', value: Math.E });
          else if (lower === 'pi') tokens.push({ type: 'num', value: Math.PI });
          else tokens.push({ type: 'func', name: lower });
          continue;
        }
        if (ch === 'π') { tokens.push({ type: 'num', value: Math.PI }); i++; continue; }
        if (ch === '×') { tokens.push({ type: 'op', value: '*' }); i++; continue; }
        if (ch === '÷') { tokens.push({ type: 'op', value: '/' }); i++; continue; }
        if (ch === '−') { tokens.push({ type: 'op', value: '-' }); i++; continue; }
        if ('+-*/^'.includes(ch)) { tokens.push({ type: 'op', value: ch }); i++; continue; }
        if (ch === '(') { tokens.push({ type: 'lparen' }); i++; continue; }
        if (ch === ')') { tokens.push({ type: 'rparen' }); i++; continue; }
        if (ch === '!') { tokens.push({ type: 'postfix', value: '!' }); i++; continue; }
        if (ch === '%') { tokens.push({ type: 'postfix', value: '%' }); i++; continue; }
        throw new Error('bad char: ' + ch);
      }
      return tokens;
    }

    function toRPN(tokens) {
      const out = [];
      const stack = [];
      const prec = { '+': 1, '-': 1, '*': 2, '/': 2, '^': 4, 'u': 5 };
      const rightAssoc = { '^': true, 'u': true };
      let prev = null;
      for (const t of tokens) {
        if (t.type === 'num') {
          out.push(t);
        } else if (t.type === 'func') {
          stack.push(t);
        } else if (t.type === 'op') {
          let op = t.value;
          const isUnary = (op === '-' || op === '+') && (prev === null || prev.type === 'op' || prev.type === 'lparen');
          if (isUnary) {
            if (op === '+') { prev = t; continue; }
            op = 'u';
          }
          while (stack.length) {
            const top = stack[stack.length - 1];
            if (top.type === 'lparen') break;
            const topP = top.type === 'func' ? 6 : prec[top.value];
            const curP = prec[op];
            if ((rightAssoc[op] && topP > curP) || (!rightAssoc[op] && topP >= curP)) {
              out.push(stack.pop());
            } else break;
          }
          stack.push({ type: 'op', value: op });
        } else if (t.type === 'postfix') {
          out.push(t);
        } else if (t.type === 'lparen') {
          stack.push(t);
        } else if (t.type === 'rparen') {
          while (stack.length && stack[stack.length - 1].type !== 'lparen') out.push(stack.pop());
          if (!stack.length) throw new Error('mismatched parens');
          stack.pop();
          if (stack.length && stack[stack.length - 1].type === 'func') out.push(stack.pop());
        }
        prev = t;
      }
      while (stack.length) {
        const top = stack.pop();
        if (top.type === 'lparen') throw new Error('mismatched parens');
        out.push(top);
      }
      return out;
    }

    function factorial(n) {
      if (n < 0 || n !== Math.floor(n)) throw new Error('factorial needs non-negative integer');
      if (n > 170) return Infinity;
      let r = 1;
      for (let i = 2; i <= n; i++) r *= i;
      return r;
    }

    function evalRPN(rpn) {
      const stack = [];
      for (const t of rpn) {
        if (t.type === 'num') stack.push(t.value);
        else if (t.type === 'op') {
          if (t.value === 'u') {
            const a = stack.pop();
            stack.push(-a);
          } else {
            const b = stack.pop();
            const a = stack.pop();
            if (a === undefined || b === undefined) throw new Error('missing operand');
            switch (t.value) {
              case '+': stack.push(a + b); break;
              case '-': stack.push(a - b); break;
              case '*': stack.push(a * b); break;
              case '/': stack.push(a / b); break;
              case '^': stack.push(Math.pow(a, b)); break;
            }
          }
        } else if (t.type === 'postfix') {
          const a = stack.pop();
          if (a === undefined) throw new Error('missing operand');
          if (t.value === '!') stack.push(factorial(a));
          else if (t.value === '%') stack.push(a / 100);
        } else if (t.type === 'func') {
          const a = stack.pop();
          if (a === undefined) throw new Error('missing operand');
          switch (t.name) {
            case 'sin': stack.push(Math.sin(a)); break;
            case 'cos': stack.push(Math.cos(a)); break;
            case 'tan': stack.push(Math.tan(a)); break;
            case 'log': stack.push(Math.log10(a)); break;
            case 'ln': stack.push(Math.log(a)); break;
            case 'sqrt': stack.push(Math.sqrt(a)); break;
            case 'abs': stack.push(Math.abs(a)); break;
            default: throw new Error('unknown function: ' + t.name);
          }
        }
      }
      if (stack.length !== 1) throw new Error('bad expression');
      return stack[0];
    }

    function evaluate(s) {
      const tokens = tokenize(s);
      if (!tokens.length) return null;
      const rpn = toRPN(tokens);
      return evalRPN(rpn);
    }

    function insert(text) {
      if (hasError) { expr = ''; hasError = false; }
      expr += text;
      render();
    }

    function clearAll() {
      expr = '';
      hasError = false;
      render();
    }

    function backspace() {
      if (hasError) { clearAll(); return; }
      expr = expr.slice(0, -1);
      render();
    }

    function toggleSign() {
      if (hasError) { clearAll(); return; }
      const m = expr.match(/(-?\d*\.?\d+)$/);
      if (!m) { expr = '-(' + expr + ')'; render(); return; }
      const start = m.index;
      const num = m[1];
      const flipped = num.startsWith('-') ? num.slice(1) : '-' + num;
      expr = expr.slice(0, start) + flipped;
      render();
    }

    function square() {
      if (!expr) { expr = '0'; }
      const m = expr.match(/(\d*\.?\d+|\([^()]*\))$/);
      if (m) {
        expr = expr.slice(0, m.index) + m[1] + '^2';
      } else {
        expr = '(' + expr + ')^2';
      }
      render();
    }

    function compute() {
      if (!expr) return;
      try {
        const v = evaluate(expr);
        if (v === null || Number.isNaN(v) || !Number.isFinite(v)) throw new Error('not a number');
        addHistory(expr, v);
        lastAns = v;
        expr = formatNumber(v);
        hasError = false;
        render();
      } catch (e) {
        resultView.textContent = 'Error';
        resultView.classList.add('error');
        hasError = true;
      }
    }

    function addHistory(expression, result) {
      history.unshift({ expression, result });
      if (history.length > 50) history.length = 50;
      renderHistory();
    }

    function renderHistory() {
      if (!history.length) {
        histList.innerHTML = '<li class="history-empty">No calculations yet.</li>';
        return;
      }
      histList.innerHTML = '';
      history.forEach((h, idx) => {
        const li = document.createElement('li');
        li.className = 'history-item';
        const e = document.createElement('div');
        e.className = 'history-expr';
        e.textContent = h.expression;
        const r = document.createElement('div');
        r.className = 'history-result';
        r.textContent = '= ' + formatNumber(h.result);
        li.appendChild(e);
        li.appendChild(r);
        li.addEventListener('click', () => {
          if (hasError) { clearAll(); }
          expr += formatNumber(h.result);
          render();
        });
        histList.appendChild(li);
      });
    }

    document.getElementById('keys').addEventListener('click', e => {
      const k = e.target.closest('button.key');
      if (!k) return;
      if (k.dataset.insert !== undefined) insert(k.dataset.insert);
      else if (k.dataset.clear !== undefined) clearAll();
      else if (k.dataset.back !== undefined) backspace();
      else if (k.dataset.sign !== undefined) toggleSign();
      else if (k.dataset.square !== undefined) square();
      else if (k.dataset.eq !== undefined) compute();
      else if (k.dataset.ans !== undefined) insert(formatNumber(lastAns));
    });

    document.getElementById('clearHist').addEventListener('click', () => {
      history.length = 0;
      renderHistory();
    });

    window.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const k = e.key;
      if (/^[0-9]$/.test(k)) { insert(k); e.preventDefault(); return; }
      if (k === '.') { insert('.'); e.preventDefault(); return; }
      if (k === '+' || k === '-') { insert(k); e.preventDefault(); return; }
      if (k === '*') { insert('×'); e.preventDefault(); return; }
      if (k === '/') { insert('÷'); e.preventDefault(); return; }
      if (k === '^') { insert('^'); e.preventDefault(); return; }
      if (k === '(' || k === ')') { insert(k); e.preventDefault(); return; }
      if (k === '!') { insert('!'); e.preventDefault(); return; }
      if (k === '%') { insert('%'); e.preventDefault(); return; }
      if (k === 'Enter' || k === '=') { compute(); e.preventDefault(); return; }
      if (k === 'Backspace') { backspace(); e.preventDefault(); return; }
      if (k === 'Escape' || k === 'Delete') { clearAll(); e.preventDefault(); return; }
    });

    render();
  </script>
</body>
</html>
